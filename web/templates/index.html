<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flang Compiler Tracer</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #1e1e1e;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
}

header {
    padding: 1.5rem;
    border-bottom: 1px solid #333;
    background: #252526;
}

h1 {
    margin: 0;
    font-size: 1.5rem;
}

main {
    padding: 1rem;
}

.layout {
    display: flex;
    gap: 20px;
    max-height: calc(100vh - 100px);
}

.examples-panel {
    flex: 0 0 180px;
    background: #252526;
    border: 1px solid #3e3e42;
    padding: 15px;
    border-radius: 4px;
    overflow-y: auto;
}

.examples-panel h2 {
    font-size: 14px;
    margin: 0 0 12px 0;
    color: #9cdcfe;
}

.examples-list {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 10px;
}

.example-item {
    background: #3c3c3c;
    border: 1px solid #555;
    color: #d4d4d4;
    padding: 6px 10px;
    text-align: left;
    cursor: pointer;
    font-size: 12px;
    border-radius: 2px;
    transition: background 0.2s;
}

.example-item:hover {
    background: #0e639c;
}

.examples-panel button {
    width: 100%;
    padding: 8px;
    background: #0e639c;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 12px;
    border-radius: 2px;
}

.trace-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 15px;
    overflow: hidden;
}

.editor-panel {
    background: #252526;
    border: 1px solid #3e3e42;
    padding: 15px;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

textarea {
    flex: 0 0 150px;
    background: #1e1e1e;
    color: #ce9178;
    border: 1px solid #3e3e42;
    padding: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    resize: vertical;
    border-radius: 2px;
}

.controls {
    display: flex;
    gap: 10px;
    align-items: center;
}

.controls button {
    padding: 8px 16px;
    background: #0e639c;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 2px;
}

.controls button:hover {
    background: #1177bb;
}

#status {
    font-size: 12px;
    color: #888;
}

#results {
    flex: 1;
    background: #252526;
    border: 1px solid #3e3e42;
    border-radius: 4px;
    overflow-y: auto;
    padding: 10px;
}

.pipeline-header {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    position: sticky;
    top: 0;
    background: #252526;
    z-index: 10;
    padding-bottom: 10px;
}

.stage {
    background: #1e1e1e;
    border: 1px solid #3e3e42;
    padding: 10px;
    text-align: center;
    font-weight: 600;
    font-size: 13px;
}

.stage small {
    display: block;
    color: #888;
    font-size: 11px;
    margin-top: 4px;
}

.pipeline-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 12px;
}

.cell {
    background: #1e1e1e;
    border: 1px solid #3e3e42;
    padding: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    overflow: auto;
    max-height: 180px;
    border-radius: 2px;
}

.cell-title {
    color: #9cdcfe;
    font-size: 10px;
    margin-bottom: 6px;
    text-transform: uppercase;
    font-weight: bold;
}

.cell pre {
    margin: 0;
    white-space: pre-wrap;
    word-wrap: break-word;
}

.tag {
    margin-top: 6px;
    display: inline-block;
    background: #0e639c;
    color: white;
    padding: 2px 6px;
    font-size: 10px;
    border-radius: 2px;
}

.empty-state {
    padding: 20px;
    text-align: center;
    color: #888;
}

</style>
</head>

<body>

<header>
    <h1>Flang Multi-Stage Compiler Tracer</h1>
</header>

<main>
    <div class="layout">
        <aside class="examples-panel">
            <h2>Example Files</h2>
            <div id="examplesList" class="examples-list">
                <p style="font-size: 12px; color: #888;">Loading...</p>
            </div>
            <button onclick="loadExamples()">Refresh</button>
        </aside>

        <section class="trace-panel">
            <div class="editor-panel">
                <textarea id="codeInput" placeholder="Paste Fortran code or select an example..."></textarea>
                <div class="controls">
                    <button onclick="executeTrace()">Trace</button>
                    <span id="status">Ready</span>
                </div>
            </div>

            <div id="results">
                <div class="pipeline-header">
                    <div class="stage">Source <small>Code</small></div>
                    <div class="stage">Parse Tree <small>AST</small></div>
                    <div class="stage">Semantics <small>Decorated</small></div>
                    <div class="stage">HLFIR / FIR <small>IR</small></div>
                    <div class="stage">LLVM IR <small>SSA</small></div>
                </div>
                <div id="grid"></div>
            </div>
        </section>
    </div>
</main>

<script>

window.addEventListener('DOMContentLoaded', () => {
    loadExamples();
});

async function loadExamples() {
    const list = document.getElementById('examplesList');
    list.innerHTML = '<p style="font-size: 12px; color: #888;">Loading...</p>';

    try {
        const res = await fetch('/api/examples');
        const data = await res.json();
        const examples = data.examples || [];

        if (!examples.length) {
            list.innerHTML = '<p style="font-size: 12px; color: #888;">No examples found.</p>';
            return;
        }

        list.innerHTML = '';
        examples.forEach(name => {
            const item = document.createElement('button');
            item.className = 'example-item';
            item.type = 'button';
            item.textContent = name.replace('.f90', '');
            item.onclick = () => loadExampleFile(name);
            list.appendChild(item);
        });
    } catch (error) {
        list.innerHTML = '<p style="font-size: 12px; color: #888;">Failed to load.</p>';
        console.error(error);
    }
}

async function loadExampleFile(name) {
    const status = document.getElementById('status');
    status.textContent = `Loading ${name}...`;

    try {
        const res = await fetch(`/api/examples/load?name=${encodeURIComponent(name)}`);
        const data = await res.json();
        if (!res.ok || !data.content) {
            status.textContent = 'Load failed';
            return;
        }
        document.getElementById('codeInput').value = data.content;
        status.textContent = `Loaded: ${name}`;
    } catch (error) {
        status.textContent = 'Load error';
        console.error(error);
    }
}

async function executeTrace() {
    const code = document.getElementById('codeInput').value;
    const status = document.getElementById('status');

    if (!code.trim()) {
        status.textContent = 'Enter code first';
        return;
    }

    status.textContent = 'Tracing...';

    const formData = new FormData();
    formData.append('code', code);

    try {
        const res = await fetch('/api/trace', {
            method: 'POST',
            body: formData
        });

        const data = await res.json();
        render(data);
        status.textContent = res.ok ? 'Complete' : 'Error';
    } catch (error) {
        status.textContent = 'Trace failed';
        console.error(error);
    }
}

function render(data) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    if (!data.nodes || !data.nodes.length) {
        grid.innerHTML = '<div class="empty-state">No trace results.</div>';
        return;
    }

    data.nodes.forEach((node, i) => {
        const row = document.createElement('div');
        row.className = 'pipeline-row';

        row.innerHTML = `
            ${cell('Source', node.text || '[No source]', node.kind)}
            ${cell('AST', node.parse_tree || '[Not captured]', '')}
            ${cell('Semantics', node.semantics || '[Not captured]', '')}
            ${cell('IR', buildIR(node), '')}
            ${cell('LLVM', node.llvm_ir || '[No relevant IR]', '')}
        `;

        grid.appendChild(row);
    });
}

function buildIR(node) {
    const parts = [];
    if (node.hlfir_op && node.hlfir_op.trim()) {
        parts.push('HLFIR:\n' + node.hlfir_op);
    }
    if (node.fir_op && node.fir_op.trim()) {
        parts.push('FIR:\n' + node.fir_op);
    }
    return parts.length ? parts.join('\n\n') : '[No IR]';
}

function cell(title, content, kind) {
    return `
    <div class="cell">
        <div class="cell-title">${title}</div>
        <pre>${escapeHtml(String(content || ''))}</pre>
        ${kind ? `<div class="tag">${escapeHtml(kind)}</div>` : ''}
    </div>
    `;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

</script>

</body>
</html>
